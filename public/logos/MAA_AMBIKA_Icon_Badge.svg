<rect x="96" y="238" width="24" height="20" fill="#1A1008" rx="2"/>
<rect x="130" y="238" width="24" height="20" fill="#1A1008" rx="2"/>
<rect x="164" y="238" width="24" height="20" fill="#1A1008" rx="2"/>
<rect x="198" y="238" width="24" height="20" fill="#1A1008" rx="2"/>
<!-- Windows row 2 -->
<rect x="96" y="270" width="24" height="20" fill="#1A1008" rx="2"/>
<rect x="130" y="270" width="24" height="20" fill="#1A1008" rx="2"/>
<rect x="164" y="270" width="24" height="20" fill="#1A1008" rx="2"/>
<rect x="198" y="270" width="24" height="20" fill="#1A1008" rx="2"/>
<!-- Door -->
<rect x="147" y="306" width="36" height="40" fill="#1A1008" rx="3"/>
