<!-- Counterweight -->
<rect x="370" y="108" width="20" height="16" fill="#A86A00" rx="2"/>
<!-- Base legs -->
<line x1="310" y1="355" x2="296" y2="385" stroke="#D4A017" stroke-width="3"/>
<line x1="328" y1="355" x2="342" y2="385" stroke="#D4A017" stroke-width="3"/>
