<line x1="310" y1="124" x2="328" y2="156" stroke="#D4A017" stroke-width="2.5"/>
<line x1="328" y1="124" x2="310" y2="156" stroke="#D4A017" stroke-width="2.5"/>
<line x1="310" y1="156" x2="328" y2="188" stroke="#D4A017" stroke-width="2.5"/>
<line x1="328" y1="156" x2="310" y2="188" stroke="#D4A017" stroke-width="2.5"/>
<line x1="310" y1="188" x2="328" y2="220" stroke="#D4A017" stroke-width="2.5"/>
