<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<title>Maa Ambika Traders — Icon Only</title>
<defs>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#F5D78E"/>
    <stop offset="40%" style="stop-color:#D4A017"/>
    <stop offset="100%" style="stop-color:#8B6000"/>
  </linearGradient>
  <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#F7E09A"/>
    <stop offset="50%" style="stop-color:#D4A017"/>
    <stop offset="100%" style="stop-color:#8B6000"/>
  </linearGradient>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1A1008"/>
    <stop offset="100%" style="stop-color:#0A0A0A"/>
  </linearGradient>
</defs>

<!-- Circle background -->
<circle cx="250" cy="250" r="248" fill="url(#bgGrad)"/>
<circle cx="250" cy="250" r="244" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>

<!-- Building -->
<rect x="80" y="225" width="170" height="120" fill="url(#goldGrad2)" rx="3"/>
